name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
    paths:
      - 'telco_customer_churn_dataset_raw.csv'
      - 'preprocessing/automate_Danuardi-Saputro.py'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run preprocessing script
        run: |
          cd preprocessing
          python automate_Danuardi-Saputro.py

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add telco_customer_churn_dataset_preprocessing/
          git commit -m "Automated preprocessing update" || echo "No changes to commit"
          git push
